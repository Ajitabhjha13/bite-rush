<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Bite Rush</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

  <!-- Top Navbar -->
  <nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="index.html">
        <i class="bi bi-lightning-charge-fill text-warning"></i> Bite Rush <span class="text-warning">Admin</span>
      </a>
      <div id="authNavItem"></div>
    </div>
  </nav>

  <div class="d-flex">
    <!-- Sidebar -->
    <div class="admin-sidebar bg-dark text-white p-3">
      <div class="nav flex-column gap-1">
        <button class="btn admin-nav-btn active text-start" data-tab="orders">
          <i class="bi bi-receipt"></i> Orders
        </button>
        <button class="btn admin-nav-btn text-start" data-tab="menu">
          <i class="bi bi-egg-fried"></i> Menu Management
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4">

      <!-- Access Denied Message (shown if not admin) -->
      <div id="accessDenied" class="d-none text-center py-5">
        <i class="bi bi-shield-lock fs-1 text-danger"></i>
        <h4 class="mt-3">Access Denied</h4>
        <p class="text-muted">You must be an admin to view this page.</p>
        <a href="index.html" class="btn btn-dark">Go Home</a>
      </div>

      <div id="adminContent" class="d-none">

        <!-- ORDERS TAB -->
        <div id="ordersTab" class="admin-tab">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0"><i class="bi bi-receipt"></i> Incoming Orders</h3>
            <span class="text-muted small"><i class="bi bi-arrow-repeat"></i> Auto-refreshes every 30s</span>
          </div>
          <div class="table-responsive">
            <table class="table table-hover bg-white align-middle shadow-sm rounded overflow-hidden">
              <thead class="table-dark">
                <tr>
                  <th>Order ID</th>
                  <th>Customer</th>
                  <th>Items</th>
                  <th>Total</th>
                  <th>Status</th>
                  <th>Placed At</th>
                </tr>
              </thead>
              <tbody id="ordersTableBody">
                <tr><td colspan="6" class="text-center py-4 text-muted">Loading orders...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- MENU MANAGEMENT TAB -->
        <div id="menuTab" class="admin-tab d-none">
          <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0"><i class="bi bi-egg-fried"></i> Menu Management</h3>
            <button class="btn btn-warning fw-semibold" data-bs-toggle="modal" data-bs-target="#menuItemModal" id="addMenuItemBtn">
              <i class="bi bi-plus-circle"></i> Add Item
            </button>
          </div>
          <div class="table-responsive">
            <table class="table table-hover bg-white align-middle shadow-sm rounded overflow-hidden">
              <thead class="table-dark">
                <tr>
                  <th>Image</th>
                  <th>Name</th>
                  <th>Category</th>
                  <th>Price</th>
                  <th>Available</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="menuTableBody">
                <tr><td colspan="6" class="text-center py-4 text-muted">Loading menu...</td></tr>
              </tbody>
            </table>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- Add/Edit Menu Item Modal -->
  <div class="modal fade" id="menuItemModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="menuModalTitle">Add Menu Item</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="menuItemForm">
            <input type="hidden" id="menuItemId">
            <div class="mb-3">
              <label class="form-label">Name</label>
              <input type="text" class="form-control" id="itemName" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" id="itemDescription" rows="2"></textarea>
            </div>
            <div class="mb-3">
              <label class="form-label">Price (₹)</label>
              <input type="number" class="form-control" id="itemPrice" required min="0">
            </div>
            <div class="mb-3">
              <label class="form-label">Image URL</label>
              <input type="text" class="form-control" id="itemImage" placeholder="https://...">
            </div>
            <div class="mb-3">
              <label class="form-label">Category</label>
              <select class="form-select" id="itemCategory" required></select>
            </div>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" id="itemAvailable" checked>
              <label class="form-check-label">Available</label>
            </div>
            <div id="menuFormError" class="alert alert-danger d-none mt-3"></div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-warning fw-semibold" id="saveMenuItemBtn">Save</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
