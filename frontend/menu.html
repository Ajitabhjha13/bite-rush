<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu | Bite Rush</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold fs-3" href="index.html">
        <i class="bi bi-lightning-charge-fill text-warning"></i> Bite Rush
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link" href="order.html">My Orders</a></li>
          <li class="nav-item">
            <a class="nav-link position-relative" href="#cartOffcanvas" data-bs-toggle="offcanvas" role="button">
              <i class="bi bi-cart3 fs-5"></i>
              <span id="cartCount" class="badge rounded-pill bg-warning text-dark position-absolute top-0 start-100 translate-middle" style="font-size:0.65rem;">0</span>
            </a>
          </li>
          <li class="nav-item" id="authNavItem">
            <a class="btn btn-warning fw-semibold ms-lg-2" href="login.html">Login</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h2 class="fw-bold mb-4 text-center">Our Menu</h2>

    <!-- Category Filter Tabs -->
    <ul class="nav nav-pills justify-content-center mb-4 gap-2" id="categoryTabs">
      <li class="nav-item">
        <button class="nav-link active category-btn" data-category="all">All</button>
      </li>
      <!-- Category buttons will be inserted here by JS -->
    </ul>

    <!-- Menu Items Grid -->
    <div class="row g-4" id="menuGrid">
      <!-- Menu cards will be inserted here by JS -->
      <div class="text-center text-muted py-5" id="menuLoading">
        <div class="spinner-border text-warning" role="status"></div>
        <p class="mt-2">Loading menu...</p>
      </div>
    </div>
  </div>

  <!-- Floating Cart Button (mobile-friendly) -->
  <button class="btn btn-warning rounded-circle shadow floating-cart-btn" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
    <i class="bi bi-cart3 fs-4"></i>
    <span id="floatingCartCount" class="badge rounded-pill bg-dark text-white position-absolute top-0 start-100 translate-middle">0</span>
  </button>

  <!-- Cart Offcanvas Sidebar -->
  <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas">
    <div class="offcanvas-header border-bottom">
      <h5 class="offcanvas-title fw-bold"><i class="bi bi-cart3"></i> Your Cart</h5>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
      <div id="cartItemsList" class="flex-grow-1">
        <p class="text-muted text-center mt-4" id="emptyCartMsg">Your cart is empty. Add some delicious items!</p>
      </div>
      <div class="border-top pt-3 mt-3">
        <div class="d-flex justify-content-between fw-bold fs-5 mb-3">
          <span>Total:</span>
          <span id="cartTotal">₹0</span>
        </div>
        <button class="btn btn-warning w-100 fw-semibold" id="checkoutBtn">
          Proceed to Checkout <i class="bi bi-arrow-right"></i>
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/menu.js"></script>
</body>
</html>
