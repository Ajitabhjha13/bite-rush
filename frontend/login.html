<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Bite Rush</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand fw-bold fs-3" href="index.html">
        <i class="bi bi-lightning-charge-fill text-warning"></i> Bite Rush
      </a>
    </div>
  </nav>

  <div class="container d-flex align-items-center justify-content-center" style="min-height: 85vh;">
    <div class="card shadow-sm p-4" style="max-width: 420px; width: 100%; border-radius: 14px;">
      <div class="text-center mb-3">
        <i class="bi bi-lightning-charge-fill text-warning fs-1"></i>
        <h3 class="fw-bold mt-2">Welcome Back</h3>
        <p class="text-muted small">Login to your Bite Rush account</p>
      </div>

      <div id="loginError" class="alert alert-danger d-none" role="alert"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" id="loginEmail" required placeholder="you@example.com">
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="loginPassword" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-warning w-100 fw-semibold py-2" id="loginBtn">
          Login
        </button>
      </form>

      <p class="text-center text-muted small mt-3 mb-0">
        Don't have an account? <a href="register.html" class="text-decoration-none fw-semibold">Register here</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
