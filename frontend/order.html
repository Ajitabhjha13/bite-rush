<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Orders | Bite Rush</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold fs-3" href="index.html">
        <i class="bi bi-lightning-charge-fill text-warning"></i> Bite Rush
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-2">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
          <li class="nav-item"><a class="nav-link active" href="order.html">My Orders</a></li>
          <li class="nav-item">
            <a class="nav-link position-relative" href="menu.html#cart">
              <i class="bi bi-cart3 fs-5"></i>
              <span id="cartCount" class="badge rounded-pill bg-warning text-dark position-absolute top-0 start-100 translate-middle" style="font-size:0.65rem;">0</span>
            </a>
          </li>
          <li class="nav-item" id="authNavItem">
            <a class="btn btn-warning fw-semibold ms-lg-2" href="login.html">Login</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container py-5">

    <!-- Checkout Panel (shown only if cart has items) -->
    <div id="checkoutPanel" class="d-none mb-5">
      <div class="card shadow-sm border-0" style="border-radius: 14px;">
        <div class="card-body p-4">
          <h4 class="fw-bold mb-3"><i class="bi bi-bag-check text-warning"></i> Review Your Order</h4>
          <div id="checkoutItemsList"></div>
          <div class="d-flex justify-content-between fw-bold fs-5 border-top pt-3 mt-3">
            <span>Total:</span>
            <span id="checkoutTotal">₹0</span>
          </div>
          <div id="checkoutError" class="alert alert-danger d-none mt-3"></div>
          <button class="btn btn-warning w-100 fw-semibold py-2 mt-3" id="placeOrderBtn">
            Confirm & Place Order <i class="bi bi-check-circle ms-1"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Order Confirmation (shown right after placing an order) -->
    <div id="confirmationPanel" class="d-none mb-5">
      <div class="card shadow-sm border-0 text-center py-5" style="border-radius: 14px;">
        <div class="card-body">
          <i class="bi bi-check-circle-fill text-success" style="font-size: 3.5rem;"></i>
          <h3 class="fw-bold mt-3">Order Placed Successfully!</h3>
          <p class="text-muted">Order ID: <span id="confirmOrderId" class="fw-semibold"></span></p>
          <p class="text-muted">Total Amount: <span id="confirmTotal" class="fw-semibold"></span></p>
          <p class="text-muted mb-4">Estimated Delivery: <span class="fw-semibold">30-40 minutes</span></p>

          <!-- Status Tracker Bar -->
          <div class="status-tracker d-flex justify-content-between mx-auto" style="max-width: 500px;">
            <div class="status-step active"><i class="bi bi-receipt"></i><span>Received</span></div>
            <div class="status-step"><i class="bi bi-egg-fried"></i><span>Preparing</span></div>
            <div class="status-step"><i class="bi bi-bag-check"></i><span>Ready</span></div>
            <div class="status-step"><i class="bi bi-truck"></i><span>Delivered</span></div>
          </div>

          <a href="menu.html" class="btn btn-dark mt-4">Order More</a>
        </div>
      </div>
    </div>

    <!-- Order History -->
    <h4 class="fw-bold mb-4"><i class="bi bi-clock-history"></i> Order History</h4>
    <div id="orderHistoryList">
      <div class="text-center text-muted py-5" id="historyLoading">
        <div class="spinner-border text-warning" role="status"></div>
        <p class="mt-2">Loading your orders...</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/order.js"></script>
</body>
</html>
